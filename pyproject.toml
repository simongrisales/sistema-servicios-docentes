[tool.black]
line-length = 88
target-version = ["py313"]
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | migrations
)/
'''

[tool.ruff]
line-length = 88
target-version = "py313"
src = ["backend"]
exclude = ["*/migrations/*"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "B", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
pythonpath = ["backend"]
testpaths = [
    "backend/tests",
    "backend/apps/asignacion/tests",
    "backend/apps/academico/tests",
    "backend/apps/usuarios/tests",
    "backend/apps/parametros/tests",
    "backend/apps/reservas/tests",
    "backend/apps/reportes/tests",
    "backend/apps/notificaciones/tests",
]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["backend"]
omit = ["*/tests/*", "*/migrations/*"]
