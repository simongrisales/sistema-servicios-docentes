[tool.black]
line-length = 88
target-version = ["py313"]
exclude = '''
/(
    \.git
  | \.venv
  | venv
  | migrations
)/
'''

[tool.ruff]
line-length = 88
target-version = "py313"
src = ["backend"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = []

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
pythonpath = ["backend"]
testpaths = ["backend/tests"]

[tool.coverage.run]
source = ["backend"]
omit = ["*/tests/*", "*/migrations/*"]
