name: CI Pipeline for Sistema de Servicios Docentes

on:
  push:
  pull_request:
    branches:
      - develop
      - main
      - feature/*

jobs:
  pruebas:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: sistema_servicios_docentes
          POSTGRES_USER: servicios_docentes
          POSTGRES_PASSWORD: servicios_docentes
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U servicios_docentes -d sistema_servicios_docentes"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: clave-ci
      DJANGO_SECRET_KEY: clave-ci
      POSTGRES_DB: sistema_servicios_docentes
      POSTGRES_USER: servicios_docentes
      POSTGRES_PASSWORD: servicios_docentes
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      VALKEY_HOST: localhost
      VALKEY_PORT: 6379
      VALKEY_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      CHANNEL_LAYERS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: jwt-ci
      JWT_ACCESS_TOKEN_LIFETIME: 60
      JWT_REFRESH_TOKEN_LIFETIME: 7
      RECAPTCHA_PUBLIC_KEY: 6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI
      RECAPTCHA_PRIVATE_KEY: 6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalacion de dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.txt

      - name: Ruff
        run: python -m ruff check backend/ conftest.py

      - name: Black
        run: python -m black --check backend/ conftest.py

      - name: Django check
        run: python manage.py check

      - name: Pytest con coverage XML
        run: python -m pytest backend/ --cov=backend/ --cov-report=xml

      - name: SonarQube scanner
        if: env.SONAR_HOST_URL != '' && env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          args: -Dproject.settings=sonar-project.properties
        env:
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

      - name: SonarQube scanner omitido
        if: env.SONAR_HOST_URL == '' || env.SONAR_TOKEN == ''
        run: echo "SonarQube omitido: faltan SONAR_HOST_URL o SONAR_TOKEN en secrets."

      - name: Levantar Django para ZAP
        run: |
          python manage.py migrate --noinput
          python manage.py seed_base_data
          python manage.py runserver 0.0.0.0:8000 > django-ci.log 2>&1 &
          for i in {1..30}; do
            curl --fail http://localhost:8000/login/ && exit 0
            sleep 2
          done
          cat django-ci.log
          exit 1

      - name: OWASP ZAP scan
        run: docker run --rm --network host ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -I -t http://localhost:8000

      - name: Build de imagen Docker
        run: docker build -f backend/Dockerfile -t sistema-servicios-docentes:ci .
