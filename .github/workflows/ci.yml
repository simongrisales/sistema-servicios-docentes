name: CI Pipeline for Sistema de Servicios Docentes

on:
  push:
  pull_request:
    branches:
      - develop
      - main
      - feature/*

jobs:
  pruebas:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: sistema_servicios_docentes
          POSTGRES_USER: servicios_docentes
          POSTGRES_PASSWORD: servicios_docentes
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U servicios_docentes -d sistema_servicios_docentes"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      SECRET_KEY: clave-ci
      DJANGO_SECRET_KEY: clave-ci
      POSTGRES_DB: sistema_servicios_docentes
      POSTGRES_USER: servicios_docentes
      POSTGRES_PASSWORD: servicios_docentes
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      VALKEY_HOST: localhost
      VALKEY_PORT: 6379
      VALKEY_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      CHANNEL_LAYERS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: jwt-ci
      JWT_ACCESS_TOKEN_LIFETIME: 60
      JWT_REFRESH_TOKEN_LIFETIME: 7
      RECAPTCHA_PUBLIC_KEY: 6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI
      RECAPTCHA_PRIVATE_KEY: 6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalacion de dependencias
        run: pip install -r requirements/dev.txt

      - name: Ruff
        run: ruff check backend/

      - name: Black
        run: black --check backend/

      - name: Pytest con coverage XML
        run: pytest backend/ --cov=backend/ --cov-report=xml

      - name: SonarQube scanner
        run: sonar-scanner -Dproject.settings=sonar-project.properties

      - name: Levantar Django para ZAP
        run: |
          python manage.py runserver 0.0.0.0:8000 > django-ci.log 2>&1 &
          sleep 15

      - name: OWASP ZAP scan
        run: docker run --rm --network host ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://localhost:8000

      - name: Build de imagen Docker
        run: docker build -f backend/Dockerfile -t sistema-servicios-docentes:ci .
