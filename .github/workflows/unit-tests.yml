name: Unit Tests

on:
  push:
  pull_request:
    branches:
      - develop
      - main
      - "feature/*"
  workflow_dispatch:

permissions:
  contents: read

env:
  DJANGO_SETTINGS_MODULE: config.settings.dev
  SECRET_KEY: clave-ci
  DJANGO_SECRET_KEY: clave-ci
  POSTGRES_DB: sistema_servicios_docentes
  POSTGRES_USER: servicios_docentes
  POSTGRES_PASSWORD: servicios_docentes
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  VALKEY_HOST: localhost
  VALKEY_PORT: 6379
  VALKEY_URL: redis://localhost:6379/0
  CELERY_BROKER_URL: redis://localhost:6379/0
  CELERY_RESULT_BACKEND: redis://localhost:6379/0
  CHANNEL_LAYERS_URL: redis://localhost:6379/0
  JWT_SECRET_KEY: jwt-ci
  JWT_ACCESS_TOKEN_LIFETIME: 60
  JWT_REFRESH_TOKEN_LIFETIME: 7
  USE_SQLITE_FOR_TESTS: false
  RECAPTCHA_PUBLIC_KEY: 6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI
  RECAPTCHA_PRIVATE_KEY: 6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe

jobs:
  unit_tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: sistema_servicios_docentes
          POSTGRES_USER: servicios_docentes
          POSTGRES_PASSWORD: servicios_docentes
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U servicios_docentes -d sistema_servicios_docentes"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Instalacion de dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.txt

      - name: Ruff
        run: python -m ruff check backend/ conftest.py

      - name: Black
        run: python -m black --check backend/ conftest.py

      - name: Django check
        run: python manage.py check

      - name: Pytest unitario
        run: python -m pytest backend/ --cov=backend/ --cov-report=xml --junitxml=junit-unit.xml

      - name: Subir reportes de prueba
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-artifacts
          path: |
            coverage.xml
            junit-unit.xml
