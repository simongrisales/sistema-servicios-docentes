{% load static %}
<header class="topbar">
    <div class="topbar-brand">
        <button class="icon-button mobile-menu-button" type="button" data-sidebar-toggle aria-label="Abrir menu">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
        </button>
        <a class="brand-lockup" href="{% url 'dashboard' %}">
            <img src="{% static 'images/logo-uco.png' %}" alt="UCO">
        </a>
    </div>

    <p class="topbar-title">Sistema Servicios Docentes</p>

    <div class="topbar-actions">
        <a class="icon-button" href="{% url 'dashboard' %}" aria-label="Calendario">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3v4M16 3v4M4 9h16M5 5h14v15H5z"/></svg>
        </a>
        <button class="icon-button" type="button" aria-label="Notificaciones" onclick="window.showToast({type: 'info', message: 'No hay notificaciones nuevas.'})">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        </button>
        <a class="icon-button" href="/admin/" aria-label="Usuario">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0M12 13a5 5 0 1 0 0-10 5 5 0 0 0 0 10"/></svg>
        </a>
        <a class="icon-button" href="{% url 'login' %}" aria-label="Salir">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17l5-5-5-5M15 12H3M21 3v18"/></svg>
        </a>
    </div>
</header>
