<div id="notification-toast" class="toast-shell" hidden>
    <span id="notification-toast-dot" class="toast-dot info" aria-hidden="true"></span>
    <div class="toast-shell__content">
        <strong>Notificacion</strong>
        <p id="notification-toast-message"></p>
    </div>
    <button
        class="toast-close"
        type="button"
        data-toast-close
        aria-label="Cerrar"
        onclick="window.hideToast && window.hideToast(); return false;"
    >&times;</button>
</div>
