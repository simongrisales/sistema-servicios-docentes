{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Servicios Docentes | Ingreso</title>
    <script src="https://www.google.com/recaptcha/api.js?render={{ recaptcha_site_key }}"></script>
    <link href="{% static 'css/tailwind.css' %}" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="mx-auto flex min-h-screen max-w-6xl items-center justify-center px-4 py-10">
        <section class="w-full max-w-md rounded-3xl border border-white/10 bg-slate-900/80 p-8 shadow-2xl backdrop-blur">
            <div class="mb-8 text-center">
                <p class="text-sm uppercase tracking-[0.35em] text-cyan-300">UCO</p>
                <h1 class="mt-2 text-3xl font-semibold">Sistema de Servicios Docentes</h1>
                <p class="mt-2 text-sm text-slate-400">Ingresa con tu cuenta institucional.</p>
            </div>

            <form id="login-form" method="post" action="/api/token/recaptcha/" class="space-y-5">
                {% csrf_token %}
                <input type="hidden" name="recaptcha_token" id="recaptcha-token">

                <label class="block">
                    <span class="mb-2 block text-sm font-medium text-slate-300">Usuario</span>
                    <input type="text" name="username" required
                           class="w-full rounded-xl border border-white/10 bg-slate-950 px-4 py-3 text-slate-100 outline-none transition focus:border-cyan-400">
                </label>

                <label class="block">
                    <span class="mb-2 block text-sm font-medium text-slate-300">Contraseña</span>
                    <input type="password" name="password" required
                           class="w-full rounded-xl border border-white/10 bg-slate-950 px-4 py-3 text-slate-100 outline-none transition focus:border-cyan-400">
                </label>

                <button type="submit"
                        class="w-full rounded-xl bg-cyan-400 px-4 py-3 font-semibold text-slate-950 transition hover:bg-cyan-300">
                    Ingresar
                </button>
            </form>
        </section>
    </main>

    <script>
      const form = document.getElementById("login-form");
      form.addEventListener("submit", function (event) {
        event.preventDefault();
        grecaptcha.ready(function () {
          grecaptcha.execute("{{ recaptcha_site_key }}", {action: "login"}).then(function (token) {
            document.getElementById("recaptcha-token").value = token;
            form.submit();
          });
        });
      });
    </script>
</body>
</html>
