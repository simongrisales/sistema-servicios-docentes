<div
    id="campana-notificaciones"
    class="relative"
    hx-get="/api/notificaciones/campana/"
    hx-trigger="every 30s"
    hx-swap="outerHTML"
>
    <button
        type="button"
        class="btn btn-ghost btn-square"
        aria-label="Notificaciones"
    >
        <svg
            class="h-5 w-5"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
            viewBox="0 0 24 24"
            aria-hidden="true"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a3 3 0 0 1-5.714 0"
            />
        </svg>
        {% if total_no_leidas %}
            <span class="badge badge-error badge-sm absolute right-1 top-1">
                {{ total_no_leidas }}
            </span>
        {% endif %}
    </button>

    {% if notificaciones %}
        <div class="dropdown-content menu bg-base-100 rounded-box z-10 mt-2 w-80 p-2 shadow">
            {% for notificacion in notificaciones %}
                <div class="border-b border-base-200 px-3 py-2 last:border-b-0">
                    <p class="text-sm font-semibold">{{ notificacion.titulo }}</p>
                    <p class="text-xs text-base-content/70">{{ notificacion.mensaje }}</p>
                </div>
            {% endfor %}
        </div>
    {% endif %}
</div>
