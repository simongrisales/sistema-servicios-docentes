services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sistema_servicios_docentes}
      POSTGRES_USER: ${POSTGRES_USER:-servicios_docentes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-servicios_docentes}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8-alpine
    command: valkey-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - valkey_data_dev:/data

  django:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_HOST: postgres
      VALKEY_HOST: valkey
      CELERY_BROKER_URL: redis://valkey:6379/0
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - valkey

  daphne:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_HOST: postgres
      VALKEY_HOST: valkey
      CELERY_BROKER_URL: redis://valkey:6379/0
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
    env_file:
      - .env
    ports:
      - "8001:8001"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - valkey

  celery:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A config worker --loglevel=info
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_HOST: postgres
      VALKEY_HOST: valkey
      CELERY_BROKER_URL: redis://valkey:6379/0
      CELERY_RESULT_BACKEND: redis://valkey:6379/0
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - postgres
      - valkey

volumes:
  postgres_data_dev:
  valkey_data_dev:
